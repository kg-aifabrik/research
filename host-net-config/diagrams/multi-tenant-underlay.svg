<text x="95" y="136.4" font-size="12" fill="#e8590c">⑥ tenant kubectl → public API endpoint (Option 1) → API VIP</text>
<rect x="720" y="955" width="560" height="165" rx="8" fill="#fffbe6" stroke="#f08c00" stroke-width="2"/>
<text x="735" y="977.2" font-size="15" fill="#e8590c">Tenant API exposure — Option 1 (public endpoint, simplest)</text>
<text x="735" y="1004.4" font-size="13" fill="#1e1e1e">• vcluster-A API published as api.tenant-a.&lt;site&gt; via the ingress edge —</text>
<text x="735" y="1020.6" font-size="13" fill="#1e1e1e">  no per-tenant VRF plumbing on the API path.</text>
<text x="735" y="1036.8" font-size="13" fill="#1e1e1e">• Edge enforces allowlist + mTLS / OIDC; terminates tenant kubectl there.</text>
<text x="735" y="1053.1" font-size="13" fill="#1e1e1e">• CP pods + VIP stay in host-vrf; tenant traffic never routes into host-vrf.</text>
<text x="735" y="1069.3" font-size="13" fill="#1e1e1e">• Same public + private dual-endpoint model as GKE.</text>
<rect x="120" y="955" width="560" height="165" rx="8" fill="#ffffff" stroke="#868e96" stroke-width="2"/>
<text x="135" y="976.3" font-size="14" fill="#1e1e1e">VRFs (EVPN routing zones — no route leaking between them)</text>
<rect x="135" y="998" width="24" height="16" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="168" y="1009.4" font-size="13" fill="#1e1e1e">host-vrf — provider ops: PXE, kubelet↔CP, API VIP, patching</text>
<rect x="135" y="1024" width="24" height="16" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="168" y="1035.3" font-size="13" fill="#1e1e1e">storage-vrf — shared; tenancy at Weka FS layer</text>
<rect x="135" y="1050" width="24" height="16" rx="8" fill="#ffd8a8" stroke="#e8590c" stroke-width="2"/>
<text x="168" y="1061.3" font-size="13" fill="#1e1e1e">tenant-A vrf — ingress, pod traffic, RoCE partition</text>
<rect x="135" y="1076" width="24" height="16" rx="8" fill="#d0bfff" stroke="#7048e8" stroke-width="2"/>
<text x="168" y="1087.3" font-size="13" fill="#1e1e1e">tenant-B vrf — provider has no routes into it</text>
