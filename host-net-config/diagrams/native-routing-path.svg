<text x="640.0" y="222.4" font-size="11" fill="#7048e8" text-anchor="start">EVPN type-5 (IP-prefix) routes carry pod /24s between leaves in tenant-A VRF</text>
<rect x="60" y="490" width="1380" height="210" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="75.0" y="512.2" font-size="15" fill="#1e1e1e" text-anchor="start">Steps</text>
<text x="75.0" y="536.4" font-size="13" fill="#1e1e1e" text-anchor="start">① podA emits  src 10.244.1.5 → dst 10.244.2.7.  Plain packet, no encap.</text>
<text x="75.0" y="564.4" font-size="13" fill="#1e1e1e" text-anchor="start">② node1 eBPF: dst not local → consult tenant routing table → next-hop leaf gateway 10.40.0.254 on bond0.400. Host does NOT encapsulate; packet egresses unchanged.</text>
<text x="75.0" y="592.4" font-size="13" fill="#1e1e1e" text-anchor="start">③ leaf-1: port+VLAN400 → tenant-A VRF. Has 10.244.2.0/24 via EVPN type-5 from leaf-9. Encapsulates in VXLAN with tenant-A L3VNI (leaf ASIC, hidden from host).</text>
<text x="75.0" y="620.4" font-size="13" fill="#1e1e1e" text-anchor="start">④ spine: forwards on OUTER header only (leaf-1 VTEP → leaf-9 VTEP). Never sees pod IPs or the tenant VRF.</text>
<text x="75.0" y="648.4" font-size="13" fill="#1e1e1e" text-anchor="start">⑤ leaf-9: decap VXLAN → L3VNI maps to tenant-A VRF → routes 10.244.2.7 to connected subnet → out its port+VLAN400 toward node2.</text>
<text x="75.0" y="676.4" font-size="13" fill="#1e1e1e" text-anchor="start">⑥ node2 eBPF: 10.244.2.7 is a local pod → bpf_redirect into podB netns. Delivered. (Return path symmetric.)</text>
