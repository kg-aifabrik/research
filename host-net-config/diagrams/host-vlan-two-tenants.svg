<path d="M 205.0 430.0 L 205.0 174.0" fill="none" stroke="#e8590c" stroke-width="2" stroke-linejoin="round"/>
<line x1="205.0" y1="174.0" x2="211.5" y2="185.3" stroke="#e8590c" stroke-width="2"/>
<line x1="205.0" y1="174.0" x2="198.5" y2="185.3" stroke="#e8590c" stroke-width="2"/>
<text x="70.0" y="336.4" font-size="11" fill="#e8590c" text-anchor="start">VLAN 300/400 + RoCE → tenant-A vrf</text>
<path d="M 1125.0 430.0 L 795.0 147.0" fill="none" stroke="#1971c2" stroke-width="2" stroke-linejoin="round"/>
<line x1="795.0" y1="147.0" x2="807.8" y2="149.4" stroke="#1971c2" stroke-width="2"/>
<line x1="795.0" y1="147.0" x2="799.3" y2="159.3" stroke="#1971c2" stroke-width="2"/>
<path d="M 1125.0 466.0 L 795.0 210.0" fill="none" stroke="#2f9e44" stroke-width="2" stroke-linejoin="round"/>
<line x1="795.0" y1="210.0" x2="807.9" y2="211.8" stroke="#2f9e44" stroke-width="2"/>
<line x1="795.0" y1="210.0" x2="799.9" y2="222.0" stroke="#2f9e44" stroke-width="2"/>
<path d="M 1240.0 430.0 L 1240.0 174.0" fill="none" stroke="#7048e8" stroke-width="2" stroke-linejoin="round"/>
<line x1="1240.0" y1="174.0" x2="1246.5" y2="185.3" stroke="#7048e8" stroke-width="2"/>
<line x1="1240.0" y1="174.0" x2="1233.5" y2="185.3" stroke="#7048e8" stroke-width="2"/>
<text x="1090.0" y="336.4" font-size="11" fill="#7048e8" text-anchor="start">VLAN 300/400 + RoCE → tenant-B vrf</text>
<rect x="80" y="690" width="1260" height="150" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="95.0" y="712.2" font-size="15" fill="#1e1e1e" text-anchor="start">What this means for the host</text>
<text x="95.0" y="736.4" font-size="13" fill="#1e1e1e" text-anchor="start">• Every host emits the SAME VLAN IDs (100/200/300/400 + RoCE). No per-tenant host config — a node is tenant-agnostic until the leaf binds its ports.</text>
<text x="95.0" y="759.4" font-size="13" fill="#1e1e1e" text-anchor="start">• VLAN 100 (host-vrf) carries ONLY provider traffic: PXE, kubelet↔vcluster API, telemetry, patching. Default route lives here. No tenant pod data.</text>
<text x="95.0" y="782.4" font-size="13" fill="#1e1e1e" text-anchor="start">• VLAN 300/400 + RoCE land in the tenant VRF. Native routing: pod CIDRs are advertised by Cilium BGP into that VRF — no host-side overlay encap.</text>
<text x="95.0" y="805.4" font-size="13" fill="#1e1e1e" text-anchor="start">• Host is multi-VRF: presence in host-vrf (.100) AND its tenant VRF (.300/.400/RoCE). Policy/source routing keeps kubelet on the host table, pods on the tenant table.</text>
<text x="95.0" y="828.4" font-size="13" fill="#1e1e1e" text-anchor="start">• Reassigning a node to another tenant = rebind {port,VLAN}→VNI at the leaf + scrub/reimage. Zero change to the host&#x27;s Netplan.</text>
</svg>