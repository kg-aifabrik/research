<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 0 1389 860" width="1389" height="860" font-family="Helvetica, Arial, sans-serif"><!-- svg-source:excalidraw-scene -->
<rect x="20" y="0" width="1389" height="860" fill="#ffffff"/>
<text x="40.0" y="42.8" font-size="24" fill="#1e1e1e" text-anchor="start" font-weight="bold">Host VLAN config &amp; VRF mapping — two hosts, two tenants</text>
<text x="40.0" y="66.2" font-size="15" fill="#495057" text-anchor="start">Identical VLAN scheme emitted by every host; the leaf {port,VLAN}→VNI binding decides the tenant</text>
<rect x="80" y="110" width="360" height="64" rx="8" fill="#ffd8a8" stroke="#e8590c" stroke-width="2"/>
<text x="95.0" y="132.3" font-size="13" fill="#e8590c" text-anchor="start">tenant-A VRF (L3VNI)</text>
<text x="95.0" y="148.6" font-size="13" fill="#e8590c" text-anchor="start">ingress + pod CIDRs + RoCE</text>
<rect x="560" y="95" width="300" height="52" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="575.0" y="114.4" font-size="12" fill="#1971c2" text-anchor="start">host-vrf (shared)</text>
<text x="575.0" y="129.4" font-size="12" fill="#1971c2" text-anchor="start">PXE, kubelet↔API, ops</text>
<rect x="560" y="158" width="300" height="52" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="575.0" y="177.4" font-size="12" fill="#2f9e44" text-anchor="start">storage-vrf (shared)</text>
<text x="575.0" y="192.4" font-size="12" fill="#2f9e44" text-anchor="start">Weka, FS-layer tenancy</text>
<rect x="980" y="110" width="360" height="64" rx="8" fill="#d0bfff" stroke="#7048e8" stroke-width="2"/>
<text x="995.0" y="132.3" font-size="13" fill="#7048e8" text-anchor="start">tenant-B VRF (L3VNI)</text>
<text x="995.0" y="148.6" font-size="13" fill="#7048e8" text-anchor="start">ingress + pod CIDRs + RoCE</text>
<text x="470.0" y="139.4" font-size="12" fill="#e03131" text-anchor="start">✕ no route</text>
<text x="470.0" y="154.4" font-size="12" fill="#e03131" text-anchor="start">leaking</text>
<text x="880.0" y="139.4" font-size="12" fill="#e03131" text-anchor="start">✕ no route</text>
<text x="880.0" y="154.4" font-size="12" fill="#e03131" text-anchor="start">leaking</text>
<rect x="80" y="250" width="1260" height="52" rx="8" fill="#fff9db" stroke="#f08c00" stroke-width="2"/>
<text x="95.0" y="270.4" font-size="13" fill="#e8590c" text-anchor="start">Leaf fabric — {port, VLAN} → VNI binding   ◆ this is the ONLY place tenancy is decided; host config is identical fleet-wide</text>
<rect x="120" y="360" width="420" height="300" rx="8" fill="#ffffff" stroke="#e8590c" stroke-width="2"/>
