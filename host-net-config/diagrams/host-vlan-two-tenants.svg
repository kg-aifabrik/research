<text x="160.0" y="520.4" font-size="12" fill="#1e1e1e" text-anchor="start">bond0.300  ingress</text>
<rect x="150" y="538" width="270" height="30" rx="8" fill="#ffd8a8" stroke="#e8590c" stroke-width="2"/>
<text x="160.0" y="556.4" font-size="12" fill="#1e1e1e" text-anchor="start">bond0.400  pod (native rt)</text>
<rect x="140" y="590" width="380" height="52" rx="8" fill="#ffd8a8" stroke="#e8590c" stroke-width="2"/>
<text x="150.0" y="608.5" font-size="11" fill="#1e1e1e" text-anchor="start">8× ConnectX-8 — RoCE underlay + VFs</text>
<text x="150.0" y="622.2" font-size="11" fill="#1e1e1e" text-anchor="start">(VF-pinned, tenant-A vrf)</text>
