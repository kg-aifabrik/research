<text x="975.0" y="382.2" font-size="15" fill="#7048e8" text-anchor="start">HGX B300  #B1 — assigned tenant B</text>
<rect x="980" y="398" width="290" height="180" rx="8" fill="#f8f9fa" stroke="#1e1e1e" stroke-width="2"/>
<text x="990.0" y="415.4" font-size="12" fill="#1e1e1e" text-anchor="start">bond0 — 2× BF-3 DPU, LACP 2×400G</text>
<rect x="990" y="430" width="270" height="30" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="1000.0" y="448.4" font-size="12" fill="#1e1e1e" text-anchor="start">bond0.100  mgmt</text>
<rect x="990" y="466" width="270" height="30" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="1000.0" y="484.4" font-size="12" fill="#1e1e1e" text-anchor="start">bond0.200  storage</text>
<rect x="990" y="502" width="270" height="30" rx="8" fill="#d0bfff" stroke="#7048e8" stroke-width="2"/>
<text x="1000.0" y="520.4" font-size="12" fill="#1e1e1e" text-anchor="start">bond0.300  ingress</text>
<rect x="990" y="538" width="270" height="30" rx="8" fill="#d0bfff" stroke="#7048e8" stroke-width="2"/>
<text x="1000.0" y="556.4" font-size="12" fill="#1e1e1e" text-anchor="start">bond0.400  pod (native rt)</text>
<rect x="980" y="590" width="380" height="52" rx="8" fill="#d0bfff" stroke="#7048e8" stroke-width="2"/>
<text x="990.0" y="608.5" font-size="11" fill="#1e1e1e" text-anchor="start">8× ConnectX-8 — RoCE underlay + VFs</text>
<text x="990.0" y="622.2" font-size="11" fill="#1e1e1e" text-anchor="start">(VF-pinned, tenant-B vrf)</text>
