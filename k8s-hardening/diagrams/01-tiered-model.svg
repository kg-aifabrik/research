<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="'Comic Sans MS','Segoe Print',cursive">
  <style>
    .t{font-size:15px;fill:#1e1e1e}
    .h{font-size:19px;font-weight:bold;fill:#1e1e1e}
    .s{font-size:12px;fill:#495057}
    .box{stroke:#1e1e1e;stroke-width:2;rx:8;fill:none}
  </style>
  <rect x="0" y="0" width="900" height="540" fill="#ffffff"/>
  <text x="30" y="36" class="h">Tiered Hardening Model  —  risk-graded, auditable, idempotent</text>

  <!-- Tier 1 -->
  <rect x="30" y="60" width="270" height="180" rx="10" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="50" y="88" class="h">Tier 1 · Cluster-level</text>
  <text x="50" y="110" class="s">SAFE · reversible · kubectl apply</text>
  <text x="50" y="138" class="t">• Pod Security Standards (PSS)</text>
  <text x="50" y="160" class="t">• Default-deny NetworkPolicy</text>
  <text x="50" y="182" class="t">• RBAC + disable SA automount</text>
  <text x="50" y="204" class="t">• 10 Kyverno policies (admission)</text>
  <text x="50" y="228" class="s">Works EVERYWHERE (kubeadm + GKE)</text>

  <!-- Tier 2 -->
  <rect x="315" y="60" width="270" height="180" rx="10" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
  <text x="335" y="88" class="h">Tier 2 · Node-level</text>
  <text x="335" y="110" class="s">IMPACTFUL · restarts CP · Ansible+SSH</text>
  <text x="335" y="138" class="t">• File perms (CIS 1.1.x)</text>
  <text x="335" y="160" class="t">• apiserver/KCM/sched flags 1.2-1.4</text>
  <text x="335" y="182" class="t">• etcd encryption-at-rest (1.5/2.x)</text>
  <text x="335" y="204" class="t">• kubelet hardening (4.2.x)</text>
  <text x="335" y="228" class="s">kubeadm ONLY — Google owns this on GKE</text>

  <!-- Tier 3 -->
  <rect x="600" y="60" width="270" height="180" rx="10" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2"/>
  <text x="620" y="88" class="h">Tier 3 · Manual</text>
  <text x="620" y="110" class="s">ORG-SPECIFIC · operator judgment</text>
  <text x="620" y="138" class="t">• OIDC IdP for kubectl</text>
  <text x="620" y="160" class="t">• cosign image signing</text>
  <text x="620" y="182" class="t">• KMS secret re-encrypt</text>
  <text x="620" y="204" class="t">• EventRateLimit, audit shipping</text>
  <text x="620" y="228" class="s">Mixed ownership on GKE</text>

  <!-- pipeline -->
  <text x="30" y="300" class="h">Pipeline (./harden.py)</text>
  <g>
    <rect x="30" y="320" width="150" height="60" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
    <text x="60" y="350" class="t">baseline</text>
    <text x="48" y="370" class="s">kube-bench+kubescape</text>

    <rect x="220" y="320" width="120" height="60" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
    <text x="255" y="350" class="t">tier1</text>
    <text x="240" y="370" class="s">apply manifests</text>

    <rect x="380" y="320" width="120" height="60" rx="8" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
    <text x="415" y="350" class="t">tier2</text>
    <text x="398" y="370" class="s">ansible roles</text>

    <rect x="540" y="320" width="150" height="60" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
    <text x="585" y="350" class="t">validate</text>
    <text x="556" y="370" class="s">re-scan + delta.md</text>

    <rect x="730" y="320" width="140" height="60" rx="8" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
    <text x="755" y="345" class="t">workload-</text>
    <text x="765" y="365" class="t">verify</text>
  </g>
  <!-- arrows -->
  <g stroke="#1e1e1e" stroke-width="2" fill="none">
    <path d="M182 350 L216 350" marker-end="url(#a)"/>
    <path d="M342 350 L376 350" marker-end="url(#a)"/>
    <path d="M502 350 L536 350" marker-end="url(#a)"/>
    <path d="M692 350 L726 350" marker-end="url(#a)"/>
  </g>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6" fill="#1e1e1e"/>
    </marker>
  </defs>

  <text x="30" y="430" class="s">Observed (3-node DO kubeadm v1.35):  kube-bench 46.9% → 58.5%  (+11.6)   ·   kubescape 39.7% → 49.2%  (+9.5)</text>
  <text x="30" y="455" class="s">Tier 1 alone moves the needle little; Tier 2 (control-plane/etcd/kubelet) drives the jump; remaining ~5-8% is Tier 3 manual.</text>
  <text x="30" y="490" class="s">Every fix references a specific CIS Kubernetes Benchmark v1.10.0 control. All phases idempotent / re-runnable.</text>
  <text x="30" y="515" class="s">Designed for FRESH, workload-free clusters — not in-place hardening of live production.</text>
</svg>
