<svg viewBox="0 0 1060 470" xmlns="http://www.w3.org/2000/svg" font-family="Virgil, 'Comic Sans MS', 'Chalkboard SE', 'Segoe Print', 'Bradley Hand', cursive"><style>text{font-family:Virgil, 'Comic Sans MS', 'Chalkboard SE', 'Segoe Print', 'Bradley Hand', cursive}</style><defs><filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.6" xChannelSelector="R" yChannelSelector="G"/></filter><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1e1e1e"/></marker></defs><rect width="1060" height="470" fill="#ffffff"/><text x="530.0" y="32" font-size="21" font-weight="700" fill="#1e1e1e" text-anchor="middle">End-to-end demo workflow</text><g filter="url(#rough)"><rect x="40" y="120" width="220" height="200" rx="13" ry="13" fill="#ffd8a8" stroke="#e8590c" stroke-width="2"/><line x1="260" y1="220" x2="290" y2="220" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/><rect x="290" y="120" width="220" height="200" rx="13" ry="13" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/><line x1="510" y1="220" x2="540" y2="220" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/><rect x="540" y="120" width="220" height="200" rx="13" ry="13" fill="#d0bfff" stroke="#6741d9" stroke-width="2"/><line x1="760" y1="220" x2="790" y2="220" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/><rect x="790" y="120" width="220" height="200" rx="13" ry="13" fill="#96f2d7" stroke="#0ca678" stroke-width="2"/><rect x="40" y="70" width="124" height="26" rx="13" ry="13" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/></g><text x="150.0" y="185.5" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">1 · Seed</text><text x="150.0" y="210.5" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">Job downloads ~1 GB</text><text x="150.0" y="232.0" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">(food101 parquet)</text><text x="150.0" y="253.5" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">→ explode to objects</text><text x="150.0" y="275.0" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">→ upload to RGW bucket</text><text x="400.0" y="196.2" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">2 · Block</text><text x="400.0" y="221.2" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">App pod requests</text><text x="400.0" y="242.8" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">RBD PVC (CephBlockPool)</text><text x="400.0" y="264.2" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">→ mounted /mnt/block</text><text x="650.0" y="196.2" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">3 · Model</text><text x="650.0" y="221.2" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">Download</text><text x="650.0" y="242.8" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">Qwen2.5-0.5B-Instruct</text><text x="650.0" y="264.2" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">→ store on /mnt/block</text><text x="900.0" y="196.2" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">4 · Object</text><text x="900.0" y="221.2" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">S3 over storage VLAN:</text><text x="900.0" y="242.8" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">download seeded objects</text><text x="900.0" y="264.2" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">+ upload new objects</text><text x="530" y="360" font-size="13.5" font-weight="700" fill="#343a40" text-anchor="middle">Block (RBD) → host kernel on *.2032   ·   Object (S3 → RGW) → pod macvlan on *.2032</text><text x="102" y="87" font-size="13" fon