<svg viewBox="0 0 1060 600" xmlns="http://www.w3.org/2000/svg" font-family="Virgil, 'Comic Sans MS', 'Chalkboard SE', 'Segoe Print', 'Bradley Hand', cursive"><style>text{font-family:Virgil, 'Comic Sans MS', 'Chalkboard SE', 'Segoe Print', 'Bradley Hand', cursive}</style><defs><filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="1.6" xChannelSelector="R" yChannelSelector="G"/></filter><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1e1e1e"/></marker></defs><rect width="1060" height="600" fill="#ffffff"/><text x="530.0" y="32" font-size="21" font-weight="700" fill="#1e1e1e" text-anchor="middle">How a pod reaches Ceph — block vs object</text><g filter="url(#rough)"><rect x="40" y="300" width="980" height="64" rx="13" ry="13" fill="#c3fae8" stroke="#0ca678" stroke-width="2"/><rect x="360" y="70" width="340" height="90" rx="13" ry="13" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><rect x="360" y="470" width="340" height="90" rx="13" ry="13" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/><rect x="70" y="180" width="250" height="80" rx="13" ry="13" fill="#ffc9c9" stroke="#e03131" stroke-width="2"/><line x1="420" y1="160" x2="200" y2="180" stroke="#e03131" stroke-width="2" marker-end="url(#ah)"/><line x1="195" y1="260" x2="410" y2="470" stroke="#e03131" stroke-width="2" marker-end="url(#ah)"/><rect x="740" y="180" width="250" height="80" rx="13" ry="13" fill="#96f2d7" stroke="#0ca678" stroke-width="2"/><line x1="640" y1="160" x2="865" y2="180" stroke="#0ca678" stroke-width="2" marker-end="url(#ah)"/><line x1="865" y1="260" x2="660" y2="470" stroke="#0ca678" stroke-width="2" marker-end="url(#ah)"/></g><text x="530.0" y="340.5" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">Storage VLAN 2032   ·   10.6.32.0/24   ·   all Ceph traffic rides here</text><text x="530.0" y="112.8" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">Application pod</text><text x="530.0" y="137.8" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">RBD PVC mounted at /mnt/block</text><text x="530.0" y="502.0" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">Rook-Ceph (host-networked)</text><text x="530.0" y="527.0" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">public_network = 10.6.32.0/24</text><text x="530.0" y="548.5" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">mon · OSD · RGW (S3)</text><text x="195.0" y="217.8" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">Host kernel RBD client</text><text x="195.0" y="242.8" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">(ceph-csi maps the image)</text><text x="250" y="150" font-size="12.5" font-weight="700" fill="#e03131" text-anchor="middle">filesystem I/O</text><text x="250" y="168" font-size="11.5" font-weight="400" fill="#868e96" text-anchor="middle">(pod opens NO socket)</text><text x="120" y="350" font-size="14" font-weight="700" fill="#e03131" text-anchor="middle">BLOCK / RBD</text><text x="120" y="372" font-size="12" font-weight="400" fill="#495057" text-anchor="middle">host carries it on *.2032</text><text x="865.0" y="217.8" font-size="17" font-weight="700" fill="#1e1e1e" text-anchor="middle">pod net2 (macvlan)</text><text x="865.0" y="242.8" font-size="13.5" font-weight="400" fill="#343a40" text-anchor="middle">S3 → RGW @ 10.6.32.y</text><text x="840" y="150" font-size="12.5" font-weight="700" fill="#0ca678" text-anchor="middle">S3 / HTTP</text><text x="930" y="350" font-size="14" font-weight="700" fill="#0ca678" text-anchor="middle">OBJECT / S3</text><text x="930" y="372" font-size="12" font-weight="400" fill="#495057" text-anchor="middle">pod carries it on *.2032</text><text x="530" y="590" font-size="13.5" font-weight="700" fill="#343a40" text-anchor="middle">Both paths land on VLAN 2032 — block via the host netns, object via the pod netns.</text></svg>