# M2 verification: a pod that should come up with 3 interfaces —
# eth0 (Cilium primary) + net1 (north-south macvlan) + net2 (storage macvlan).
apiVersion: v1
kind: Pod
metadata:
  name: tri-net
  annotations:
    k8s.v1.cni.cncf.io/networks: north-south-net, storage-net
spec:
  containers:
    - name: c
      image: busybox:1.36
      command: ["sleep", "3600"]
