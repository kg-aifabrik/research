<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 940" font-family="'Comic Sans MS','Segoe Print','Bradley Hand','Chalkboard SE',Chalkboard,cursive" font-size="15">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#343a40"/>
    </marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e03131"/>
    </marker>
    <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#868e96"/>
    </marker>
  </defs>
  <style>
    rect { stroke-width:2; }
    text { fill:#1e1e1e; }
    .t { text-anchor:middle; }
    .sub { font-size:12.5px; fill:#495057; }
    .tag { font-size:11.5px; fill:#1971c2; }
    .edge { stroke:#343a40; stroke-width:2; fill:none; stroke-linecap:round; }
    .edgered { stroke:#e03131; stroke-width:4; fill:none; stroke-linecap:round; }
    .edgedash { stroke:#868e96; stroke-width:2; fill:none; stroke-dasharray:6 6; stroke-linecap:round; }
  </style>

  <text x="590" y="34" class="t" font-size="23" fill="#1e1e1e">iac-k8s — GKE Cluster Factory &amp; Operator Console</text>

  <!-- L1 Console -->
  <rect x="390" y="62" width="400" height="62" rx="13" fill="#a5d8ff" stroke="#1971c2"/>
  <text x="590" y="90" class="t">👤 Operator → Operator Console</text>
  <text x="590" y="110" class="t sub">React + FastAPI · scans · node pools · inventory (D9)</text>

  <!-- L2 Git + TF backend -->
  <rect x="70" y="160" width="470" height="74" rx="13" fill="#ffec99" stroke="#f08c00"/>
  <text x="305" y="188" class="t">declared intent in Git (D8)</text>
  <text x="305" y="208" class="t sub">infra tfvars · guardrail policy · app repos</text>
  <text x="305" y="225" class="t sub">PR → plan → approve → apply</text>

  <rect x="740" y="160" width="370" height="74" rx="13" fill="#ffc9c9" stroke="#e03131"/>
  <text x="925" y="190" class="t">⚠ TF execution backend</text>
  <text x="925" y="212" class="t sub">OPEN: GH Actions+runners vs Atlantis</text>

  <!-- L3 GCP foundation + Factory -->
  <rect x="70" y="282" width="470" height="68" rx="13" fill="#b2f2bb" stroke="#2f9e44"/>
  <text x="305" y="310" class="t">GCP foundation — Terraform</text>
  <text x="305" y="330" class="t sub">org policy · projects · WIF (no keys) · KMS · VPC</text>

  <rect x="640" y="282" width="470" height="68" rx="13" fill="#b2f2bb" stroke="#2f9e44"/>
  <text x="875" y="310" class="t">🏭 Cluster Factory — Terraform</text>
  <text x="875" y="330" class="t sub">gke-cluster module + companion state modules (D5)</text>

  <!-- L4 GitOps -->
  <rect x="170" y="386" width="340" height="60" rx="13" fill="#e9ecef" stroke="#495057"/>
  <text x="340" y="412" class="t">Config Sync</text>
  <text x="340" y="431" class="t sub">guardrails + drift-heal</text>

  <rect x="640" y="386" width="340" height="60" rx="13" fill="#e9ecef" stroke="#495057"/>
  <text x="810" y="412" class="t">ArgoCD</text>
  <text x="810" y="431" class="t sub">app delivery</text>

  <!-- L5 Clusters container -->
  <rect x="70" y="478" width="1040" height="200" rx="16" fill="#f3f0ff" stroke="#7048e8"/>
  <text x="590" y="500" class="t" font-size="14" fill="#5f3dc4">Hardened regional GKE clusters · Standard mode · COS (D3) · CIS L2 (D2) · one FOP (D6)</text>

  <rect x="110" y="514" width="380" height="62" rx="12" fill="#d0bfff" stroke="#7048e8"/>
  <text x="300" y="540" class="t">FOP cluster</text>
  <text x="300" y="560" class="t sub">Rafay Controller (workload)</text>

  <rect x="560" y="514" width="380" height="62" rx="12" fill="#d0bfff" stroke="#7048e8"/>
  <text x="750" y="540" class="t">Management Plane cluster</text>
  <text x="750" y="560" class="t sub">operator fns + console backend</text>

  <rect x="110" y="600" width="300" height="58" rx="11" fill="#fff" stroke="#7048e8"/>
  <text x="260" y="625" class="t" font-size="14">standard node pool</text>
  <text x="260" y="644" class="t sub">non-sensitive (D1)</text>

  <rect x="440" y="600" width="300" height="58" rx="11" fill="#fff" stroke="#7048e8"/>
  <text x="590" y="625" class="t" font-size="14">confidential pool</text>
  <text x="590" y="644" class="t sub">AMD SEV · sensitive (D1/D7)</text>

  <rect x="770" y="600" width="300" height="58" rx="11" fill="#fff" stroke="#7048e8"/>
  <text x="920" y="625" class="t" font-size="14">ubuntu pool</text>
  <text x="920" y="644" class="t sub">opt-in (D3)</text>

  <!-- L6 Day-2 + conformance -->
  <rect x="70" y="712" width="250" height="64" rx="12" fill="#ffe8cc" stroke="#e8590c"/>
  <text x="195" y="738" class="t" font-size="14">upgrade profiles</text>
  <text x="195" y="757" class="t sub">channels + windows</text>

  <rect x="340" y="712" width="250" height="64" rx="12" fill="#ffe8cc" stroke="#e8590c"/>
  <text x="465" y="738" class="t" font-size="14">scan pipeline</text>
  <text x="465" y="757" class="t sub">kube-bench + kubescape</text>

  <rect x="610" y="712" width="250" height="64" rx="12" fill="#ffe8cc" stroke="#e8590c"/>
  <text x="735" y="738" class="t" font-size="14">GKE Security Posture</text>
  <text x="735" y="757" class="t sub">findings</text>

  <rect x="880" y="712" width="250" height="64" rx="12" fill="#ffe8cc" stroke="#e8590c"/>
  <text x="1005" y="738" class="t" font-size="14">observability</text>
  <text x="1005" y="757" class="t sub">logs · metrics · audit</text>

  <!-- L7 site fleet boundary -->
  <rect x="360" y="822" width="460" height="60" rx="13" fill="#ffc9c9" stroke="#e03131" stroke-dasharray="8 5"/>
  <text x="590" y="848" class="t">⤵ on-prem site k8s fleet</text>
  <text x="590" y="868" class="t sub">managed by Rafay — OUT OF SCOPE (D6)</text>

  <!-- Edges -->
  <path class="edge" d="M520,124 C470,140 400,148 360,158" marker-end="url(#arrow)"/>
  <path class="edge" d="M540,197 L734,197" marker-end="url(#arrow)"/>
  <path class="edge" d="M905,234 C895,255 885,268 878,280" marker-end="url(#arrow)"/>
  <path class="edge" d="M770,234 C610,258 470,266 410,280" marker-end="url(#arrow)"/>
  <path class="edge" d="M845,350 C760,400 720,440 700,478" marker-end="url(#arrow)"/>
  <path class="edge" d="M320,350 C320,380 330,376 338,386" marker-end="url(#arrow)"/>
  <path class="edge" d="M340,446 L340,476" marker-end="url(#arrow)"/>
  <path class="edge" d="M810,446 L810,476" marker-end="url(#arrow)"/>
  <path class="edge" d="M590,678 L590,710" marker-end="url(#arrow)"/>
  <path class="edgered" d="M300,576 C300,720 360,790 470,822" marker-end="url(#arrowred)"/>
  <path class="edgedash" d="M1110,560 C1150,420 1010,150 792,100" marker-end="url(#arrowgray)"/>
  <text x="1120" y="430" class="sub" text-anchor="end" transform="rotate(90 1120 430)">reads: scans · posture · inventory</text>
</svg>
